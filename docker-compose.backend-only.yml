services:
  redis:
    image: redis:7-alpine
    container_name: checkers-api-redis
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: checkers-backend
    env_file:
      - .env
    environment:
      DJANGO_ENV: production
      DJANGO_DEBUG: "0"
      DJANGO_ALLOWED_HOSTS: 127.0.0.1,localhost,backend,frontend
      DJANGO_CSRF_TRUSTED_ORIGINS: http://localhost:8080,http://127.0.0.1:8080
      DJANGO_CORS_ALLOW_ALL_ORIGINS: "0"
      DJANGO_DB_PATH: /data/db.sqlite3
      RQ_REDIS_URL: redis://redis:6379/0
      GUNICORN_WORKERS: "3"
      GUNICORN_TIMEOUT: "120"
    volumes:
      - backend_data:/data
    depends_on:
      - redis
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import socket; s=socket.socket(); s.settimeout(2); s.connect(('127.0.0.1', 8000)); s.close()",
        ]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 20s
    expose:
      - "8000"
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: checkers-api-worker
    command: ["python", "manage.py", "rqworker", "default"]
    env_file:
      - .env
    environment:
      DJANGO_ENV: production
      DJANGO_DEBUG: "0"
      DJANGO_ALLOWED_HOSTS: 127.0.0.1,localhost,backend,frontend
      DJANGO_CSRF_TRUSTED_ORIGINS: http://localhost:8080,http://127.0.0.1:8080
      DJANGO_CORS_ALLOW_ALL_ORIGINS: "0"
      DJANGO_DB_PATH: /data/db.sqlite3
      RQ_REDIS_URL: redis://redis:6379/0
      RUN_MIGRATIONS: "0"
      RUN_COLLECTSTATIC: "0"
    volumes:
      - backend_data:/data
    depends_on:
      - redis
    restart: unless-stopped

  frontend:
    image: ${FRONTEND_IMAGE}
    container_name: checkers-frontend
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "8080:80"
    restart: unless-stopped

volumes:
  backend_data:
  redis_data:
